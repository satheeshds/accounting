services:
  portal:
    build: .
    ports:
      - "8080:80"
    environment:
      - NEXUS_HOST=nexus-gateway
      - NEXUS_PORT=5433
      - NEXUS_USER=portal
      - NEXUS_PASSWORD=changeme
      - NEXUS_DATABASE=lake
      - AUTH_USER=admin
      - AUTH_PASS=changeme
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - nexus-gateway

  nexus-gateway:
    image: satheeshds/nexus-gateway:latest
    ports:
      - "5433:5433"
    restart: unless-stopped
